name: Qlty Analysis

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  qlty:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install and run Qlty
        run: |
          # 1. Скачиваем и устанавливаем CLI
          curl https://qlty.sh/install.sh | sh
          
          # 2. Добавляем путь к бинарнику в PATH
          export PATH="$HOME/.qlty/bin:$PATH"
          
          # 3. Запускаем анализ с указанием конфигурации
          qlty check --config qlty.toml