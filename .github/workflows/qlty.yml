name: Qlty Analysis

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  qlty:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Важно для Qlty

      - name: Install Qlty
        run: |
          curl https://qlty.sh/install.sh | sh
          echo "$HOME/.qlty/bin" >> $GITHUB_PATH

      - name: Run Qlty check
        run: |
          qlty check
        env:
          QLTY_TOKEN: ${{ secrets.QLTY_COVERAGE_TOKEN }}  # Если используете Qlty Cloud